# 宝塔：api2.h6ign.com → 本机 Go:8080
# 管理后台 center（跨域）访问 api2 时，浏览器会先发 OPTIONS 预检。
# 若 Nginx/上游在预检阶段未返回 Access-Control-Allow-*，会报 CORS 错。
#
# 用法：网站 → api2 站点 → 设置 → 配置文件，把下面 server { } 合并进你的站点
# （或与宝塔生成的 server 对照：保留 listen、ssl、日志等，只替换 location / 段）
#
# —— 拉流防盗刷（推荐）：在「http { } 」块内、任意 server 之外增加（整站一份即可）——
#   limit_req_zone $binary_remote_addr zone=short_stream:16m rate=20r/s;
# 说明：按 IP 限流；视频 Range 会多次请求，20r/s + burst 给足缓冲。若 503 可略调高 rate 或 burst。
# Optional：仅网页盗链时可在下面 location 里加 valid_referers（原生 Exo 常无 Referer，默认不启用）

server {
    listen 80;
    server_name api2.h6ign.com;

    # 整站反代，不要用 root 找静态文件
    # 需先在 http 块配置 short_stream 的 limit_req_zone（见文件头注释）
    location ^~ /api/v1/stream/ {
        limit_req zone=short_stream burst=80 nodelay;
        # 可选防网页直链，若 App 全走原生可保留注释；开则确认客户端请求带 Referer
        # valid_referers none blocked server_names *.h6ign.com;
        # if ($invalid_referer) { return 403; }
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        # 预检请求在 Nginx 直接应答，保证一定带 CORS 头（不依赖此时 Go 是否异常）
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Requested-With' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # 正式 GET/POST 的 CORS 由 Go（middleware.CORS）返回；此处只保证 OPTIONS 预检必带跨域头
    }

    access_log  /www/wwwlogs/api2.h6ign.com.log;
    error_log   /www/wwwlogs/api2.h6ign.com.error.log;
}
