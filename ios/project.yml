# 在 macOS 上生成 Xcode 工程: brew install xcodegen && cd ios && xcodegen
name: HongguoTheater
options:
  bundleIdPrefix: com.hongguo
  deploymentTarget:
    iOS: "16.7"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"
targets:
  HongguoTheater:
    type: application
    platform: iOS
    deploymentTarget: "16.7"
    sources:
      - path: HongguoTheater
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.hongguo.theater
      INFOPLIST_FILE: HongguoTheater/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
    scheme: {}
