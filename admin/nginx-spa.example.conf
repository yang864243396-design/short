# 管理后台（Vue Router History）部署在 center 域名时使用
# 宝塔：网站 → center.h6ign.com → 设置 → 配置文件
# 在 server { } 里找到 root 指向 dist 的那一段，确保有下面 location /

server {
    listen 80;
    server_name center.h6ign.com;
    root /www/wwwroot/center路径/dist;   # 改成你实际上传 dist 的目录
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 若有静态资源缓存可另加 location ~* \.(js|css|png|jpg|...) { expires ... }
}
